<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <!-- fine grid -->
    <pattern id="minor" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M25 0H0V25" fill="none" stroke="#1e6fd9" stroke-width="0.6" stroke-opacity="0.09"/>
    </pattern>
    <!-- coarse grid -->
    <pattern id="major" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#1e6fd9" stroke-width="1" stroke-opacity="0.16"/>
    </pattern>
  </defs>

  <!-- grid fills the whole tile -->
  <rect width="1000" height="1000" fill="url(#minor)"/>
  <rect width="1000" height="1000" fill="url(#major)"/>

  <!-- all line-art drawn faintly in the brand blue -->
  <g fill="none" stroke="#14427a" stroke-opacity="0.22" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- ===== TOWER CRANE ===== -->
    <g transform="translate(120,120)">
      <!-- base -->
      <path d="M-30 360 L30 360 M-20 360 L-12 320 M20 360 L12 320 M-12 320 H12"/>
      <!-- mast (lattice) -->
      <path d="M-12 320 V40 M12 320 V40"/>
      <path d="M-12 320 L12 280 M12 320 L-12 280 M-12 280 L12 240 M12 280 L-12 240
               M-12 240 L12 200 M12 240 L-12 200 M-12 200 L12 160 M12 200 L-12 160
               M-12 160 L12 120 M12 160 L-12 120 M-12 120 L12 80 M12 120 L-12 80
               M-12 80 L12 40 M12 80 L-12 40"/>
      <!-- operator cab -->
      <rect x="-16" y="14" width="32" height="28" rx="3"/>
      <!-- jib (working arm) -->
      <path d="M0 20 L300 20 M0 44 L300 60"/>
      <path d="M40 20 L48 44 M90 20 L100 47 M140 20 L152 50 M190 20 L204 53 M240 20 L256 56"/>
      <!-- counter-jib + counterweight -->
      <path d="M0 20 L-90 20 M0 44 L-80 40"/>
      <rect x="-92" y="20" width="24" height="34" rx="2"/>
      <!-- top apex / tie bars -->
      <path d="M0 -34 L150 20 M0 -34 L-50 20 M0 20 L0 -34"/>
      <!-- hoist cable + hook + load -->
      <path d="M210 22 V120"/>
      <path d="M204 120 h12 M210 120 v10"/>
      <rect x="194" y="132" width="32" height="22"/>
    </g>

    <!-- ===== DIMENSION LINE ===== -->
    <g transform="translate(560,140)">
      <path d="M0 0 V36 M320 0 V36"/>
      <path d="M0 24 H320"/>
      <path d="M0 24 L16 18 M0 24 L16 30 M320 24 L304 18 M320 24 L304 30"/>
      <text x="160" y="18" text-anchor="middle" font-family="monospace"
            font-size="20" fill="#14427a" fill-opacity="0.3" stroke="none">12.50 m</text>
    </g>

    <!-- ===== I-BEAM CROSS-SECTION ===== -->
    <g transform="translate(720,470)">
      <path d="M0 0 H120 M0 24 H120 M40 24 V150 M80 24 V150 M0 150 H120 M0 174 H120"/>
      <!-- hatching -->
      <path d="M44 30 L76 62 M44 60 L76 92 M44 90 L76 122 M44 120 L76 144" stroke-width="1"/>
      <!-- web dimension ticks -->
      <path d="M150 24 V150 M144 24 H156 M144 150 H156"/>
    </g>

    <!-- ===== SURVEY / SET-OUT POINT ===== -->
    <g transform="translate(300,640)">
      <circle cx="0" cy="0" r="48"/>
      <circle cx="0" cy="0" r="6"/>
      <path d="M-70 0 H70 M0 -70 V70"/>
      <path d="M0 0 L120 -70"/>
      <text x="128" y="-74" font-family="monospace" font-size="18"
            fill="#14427a" fill-opacity="0.3" stroke="none">R 4.80</text>
    </g>

    <!-- ===== 45° SET SQUARE ===== -->
    <g transform="translate(560,720)">
      <path d="M0 0 H230 L0 180 Z"/>
      <path d="M0 0 H210 L0 165 Z" stroke-width="1"/>
      <path d="M0 150 A30 30 0 0 0 24 132" stroke-width="1.4"/>
    </g>

    <!-- ===== ANGLE / TRIANGULATION ===== -->
    <g transform="translate(110,720)">
      <path d="M0 200 L160 200 L60 60 Z"/>
      <path d="M0 200 L120 110" stroke-width="1" stroke-dasharray="6 6"/>
      <path d="M28 200 A28 28 0 0 0 14 178" stroke-width="1.4"/>
    </g>
  </g>
</svg>
